site_name: reef-tools
site_description: Modular Python package for reef and water quality analysis
site_author: Frederick Bennett
repo_url: https://github.com/frbennett/reef-tools
repo_name: frbennett/reef-tools
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            heading_level: 2
            docstring_style: google
            members_order: source
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Module Guides:
      - I/O: modules/io.md
      - Statistics: modules/stats.md
      - Visualization: modules/viz.md
      - Climate: modules/climate.md
      - Water Quality: modules/water_quality.md
      - Utilities: modules/utils.md
  - API Reference: api/index.md
  - Contributing: contributing.md
  - Changelog: changelog.md
